apiVersion: apps/v1
kind: Deployment
metadata:
  name: clouds-web
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clouds-web
  template:
    metadata:
      labels:
        app: clouds-web
    spec:
      containers:
      - name: clouds-web
        image: docker.io/YOUR_DOCKERHUB_USERNAME/clouds-web:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      imagePullSecrets:
      - name: dockerhub-secret
---
apiVersion: v1
kind: Service
metadata:
  name: clouds-web-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: clouds-web
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000

apiVersion: v1
kind: Namespace
metadata:
  name: clouds-web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clouds-web
  namespace: clouds-web
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: clouds-web
  template:
    metadata:
      labels:
        app: clouds-web
    spec:
      containers:
      - name: clouds-web
        image: docker.io/jk2022jk/clouds-web:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          hostPort: 80
          name: http
        # livenessProbe:
        #   httpGet:
        #     path: /
        #     port: 3000
        #   initialDelaySeconds: 30
        #   periodSeconds: 10
        #   timeoutSeconds: 5
        #   failureThreshold: 3
        # readinessProbe:
        #   httpGet:
        #     path: /
        #     port: 3000
        #   initialDelaySeconds: 10
        #   periodSeconds: 5
        #   timeoutSeconds: 3
        #   failureThreshold: 2
        # resources:
        #   requests:
        #     memory: "256Mi"
        #     cpu: "250m"
        #   limits:
        #     memory: "512Mi"
        #     cpu: "500m"
      imagePullSecrets:
      - name: dockerhub-secret
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: clouds-web-service
  namespace: clouds-web
  labels:
    app: clouds-web
spec:
  type: ClusterIP
  # type: NodePort
  # type: LoadBalancer
  selector:
    app: clouds-web
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
    # nodePort: 30080
    name: http

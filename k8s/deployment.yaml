apiVersion: v1
kind: Namespace
metadata:
  name: clouds-web-next

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clouds-web-next
  namespace: clouds-web-next
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: clouds-web-next
  template:
    metadata:
      labels:
        app: clouds-web-next
    spec:
      containers:
      - name: clouds-web-next
        image: clouds-web-next:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          # hostPort: 80
          name: http
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            memory: "100Mi"
            cpu: "100m"
          limits:
            memory: "200Mi"
            cpu: "200m"
      imagePullSecrets:
      - name: dockerhub-secret
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: clouds-web-next-service
  namespace: clouds-web-next
  labels:
    app: clouds-web-next
spec:
  type: ClusterIP
  # type: NodePort
  # type: LoadBalancer
  selector:
    app: clouds-web-next
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
    # nodePort: 30080
    name: http

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clouds-web-next-ingress
  namespace: clouds-web-next
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - jk66888.ccwu.cc
    secretName: clouds-web-next-tls
  rules:
  - host: jk66888.ccwu.cc
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: clouds-web-next-service
            port:
              number: 80
  - host: test.jk66888.ccwu.cc
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: clouds-web-next-service
            port:
              number: 80

name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_NAME: clouds-web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # TODO: 除錯用，確認完 Secrets 對應到正確主機/帳號後可移除此步驟
      - name: Debug SSH connection
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          script: |
            echo "== whoami =="
            whoami
            echo "== hostname =="
            hostname
            hostname -I
            echo "== PATH =="
            echo $PATH
            echo "== which docker =="
            which docker || echo "docker not found"
            echo "== which kubectl =="
            which kubectl || echo "kubectl not found"
            echo "== k3s.yaml exists? =="
            ls -l /etc/rancher/k3s/k3s.yaml || echo "k3s.yaml not found"

      - name: Sync deployment.yaml to ECS
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          source: "k8s/deployment.yaml"
          target: "/root"
          strip_components: 1

      - name: Deploy to K3s on Aliyun ECS via SSH
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          script: |
            set -e

            # 1. 設置變量
            DOCKER_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            DOCKER_TOKEN="${{ secrets.DOCKERHUB_TOKEN }}"
            IMAGE_NAME="clouds-web"
            REGISTRY="docker.io"
            IMAGE_TAG="${REGISTRY}/${DOCKER_USERNAME}/${IMAGE_NAME}:latest"
            NAMESPACE="clouds-web"
            K3S_CONFIG="/etc/rancher/k3s/k3s.yaml"

            # 2. 登入 Docker Hub
            echo "${DOCKER_TOKEN}" | docker login -u "${DOCKER_USERNAME}" --password-stdin

            # 3. 拉取最新鏡像
            echo "🐳 Pulling latest Docker image: ${IMAGE_TAG}"
            docker pull "${IMAGE_TAG}"

            # 4. 建立 Namespace（如果不存在）
            echo "📦 Creating Kubernetes namespace..."
            kubectl --kubeconfig="${K3S_CONFIG}" create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

            # 5. 建立 Docker Hub 登入密鑰（用於 k8s 拉取私有鏡像）
            echo "🔐 Creating Docker registry secret..."
            kubectl --kubeconfig="${K3S_CONFIG}" -n "${NAMESPACE}" delete secret dockerhub-secret --ignore-not-found=true
            kubectl --kubeconfig="${K3S_CONFIG}" -n "${NAMESPACE}" create secret docker-registry dockerhub-secret \
              --docker-server="${REGISTRY}" \
              --docker-username="${DOCKER_USERNAME}" \
              --docker-password="${DOCKER_TOKEN}" \
              --docker-email="dummy@example.com"

            # 6. 應用 Kubernetes 部署（自動拉取最新鏡像）
            echo "🚀 Deploying to K3s..."
            kubectl --kubeconfig="${K3S_CONFIG}" apply -f /root/deployment.yaml

            # 7. 等待部署完成
            echo "⏳ Waiting for deployment to be ready..."
            ROLLOUT_STATUS=0
            kubectl --kubeconfig="${K3S_CONFIG}" -n "${NAMESPACE}" rollout status deployment/clouds-web --timeout=5m || ROLLOUT_STATUS=$?

            # 8. 顯示部署狀態（無論成功與否都印出，方便除錯）
            echo "== pods =="
            kubectl --kubeconfig="${K3S_CONFIG}" -n "${NAMESPACE}" get pods -o wide
            echo "== describe pods =="
            kubectl --kubeconfig="${K3S_CONFIG}" -n "${NAMESPACE}" describe pods
            echo "== events =="
            kubectl --kubeconfig="${K3S_CONFIG}" -n "${NAMESPACE}" get events --sort-by=.lastTimestamp

            # 9. 清理 Docker 登入
            docker logout

            if [ "$ROLLOUT_STATUS" -ne 0 ]; then
              echo "❌ Deployment rollout failed"
              exit "$ROLLOUT_STATUS"
            fi
            echo "✅ Deployment completed!"




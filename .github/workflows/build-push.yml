name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_NAME: clouds-web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Aliyun ECS via SSH with Kubernetes
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          script: |
            set -e

            export KUBECONFIG=/root/.kube/config
            CLUSTER_NAME="clouds-web-cluster"
            DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            IMAGE_NAME="${{ env.IMAGE_NAME }}"
            IMAGE_TAG="${{ steps.meta.outputs.version }}"
            REPO_DIR="/opt/clouds-web"
            GITHUB_REPO="${{ github.server_url }}/${{ github.repository }}"

            # 0. 克隆或更新项目仓库
            echo "📂 Setting up repository..."
            if [ -d "${REPO_DIR}" ]; then
              echo "📝 Updating existing repository..."
              cd "${REPO_DIR}"
              git fetch origin
              git checkout main
              git pull origin main
            else
              echo "🔄 Cloning repository..."
              git clone --branch main "${GITHUB_REPO}" "${REPO_DIR}"
              cd "${REPO_DIR}"
            fi

            # 1. 檢查 kind 集群是否存在，若不存在則建立
            if ! kind get clusters 2>/dev/null | grep -q "^${CLUSTER_NAME}$"; then
              echo "📦 Creating kind cluster: ${CLUSTER_NAME}"
              kind create cluster --name "${CLUSTER_NAME}"
            else
              echo "✅ Kind cluster exists: ${CLUSTER_NAME}"
            fi

            # 2. 設定集群上下文
            kubectl config use-context "kind-${CLUSTER_NAME}"

            # 3. 建立 docker registry secret
            echo "🔐 Creating Docker registry secret..."
            kubectl delete secret dockerhub-secret --ignore-not-found
            kubectl create secret docker-registry dockerhub-secret \
              --docker-server=docker.io \
              --docker-username="${DOCKERHUB_USERNAME}" \
              --docker-password="${{ secrets.DOCKERHUB_TOKEN }}" \
              --docker-email="ci@example.com"

            # 4. 替換 deployment.yaml 中的用戶名並應用
            echo "📋 Applying Kubernetes manifests..."
            sed "s/YOUR_DOCKERHUB_USERNAME/${DOCKERHUB_USERNAME}/g" ${REPO_DIR}/k8s/deployment.yaml | kubectl apply -f -

            # 5. 更新部署鏡像（使用 kubectl patch）
            echo "🔄 Updating image to ${IMAGE_TAG}..."
            kubectl patch deployment clouds-web --type='json' -p="[{'op': 'replace', 'path': '/spec/template/spec/containers/0/image', 'value':'${{ env.REGISTRY }}/${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${IMAGE_TAG}'}]"

            # 6. 等待部署更新完成
            echo "⏳ Waiting for rollout..."
            kubectl rollout status deployment/clouds-web --timeout=5m

            # 7. 查看部署狀態
            echo ""
            echo "=== Deployment Status ==="
            kubectl get pods -l app=clouds-web
            kubectl get svc clouds-web-service

